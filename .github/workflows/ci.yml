name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Setup Bun
        uses: kevinmarrec/workflows/setup-bun@358a1d82547e5e4dae0297abc2e17df953b5f0b2 # main

      - name: Lint
        run: bun run lint

      - name: Check unused files, dependencies, and exports
        run: bun run knip

      - name: Type check
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:coverage

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1
        with:
          file-coverage-mode: all
          comment-on: none

  build-actions:
    name: Build actions
    needs: check-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Bun
        uses: kevinmarrec/workflows/setup-bun@358a1d82547e5e4dae0297abc2e17df953b5f0b2 # main
        with:
          persist-credentials: true

      - name: Build actions
        run: bun run build:actions

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: 'chore(actions): update build artifacts'
          file_pattern: filesize-diff/dist
